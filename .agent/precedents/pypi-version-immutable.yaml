id: pypi-version-immutable
holding: >
  PyPI versions are immutable. Once uploaded, a version number
  cannot be reused even if the GitHub release is deleted. Always
  bump version before re-releasing.
applies_when: releasing Python packages to PyPI
origin: failed v0.1.3 re-release after Unicode fix
severity: P1
tags: [release, pypi, versioning]
status: active
related: [unicode-encoding-safety]
