id: adversarial-means-indistinguishable
holding: >
  "Adversarial design" is triggered by indistinguishability of
  correct and incorrect output, not by adversarial intent.
  Agent errors exploit verification gaps the same way an
  adversary would — not intentionally, but indistinguishably.
applies_when: evaluating whether independent verification is needed
origin: user correction of agent reasoning, constitutional design session
severity: P1
