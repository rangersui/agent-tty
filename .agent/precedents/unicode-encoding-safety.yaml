id: unicode-encoding-safety
holding: >
  CLI help text and docstrings must not contain characters
  outside ASCII. Windows cp1252 cannot encode Unicode symbols
  like checkmarks or emoji, causing crashes on print.
applies_when: writing help text, docstrings, or user-facing CLI output
origin: Windows CI crash on v0.1.3 release — cp1252 encoding failure
severity: P1
tags: [cli, encoding, windows, cross-platform]
status: active
related: [pypi-version-immutable]
date: 2026-06-20
supersedes: null
