# agent-tty precedent index
# Read this first. Match applies_when/tags to current task.
# Load full precedent files only for matches.

- id: research-before-guessing
  holding: Research source before adapting unfamiliar APIs.
  applies_when: adapting unfamiliar API, library, or tool
  tags: [research, api, integration]
  severity: P2
  status: active

- id: event-spoof-accepted
  holding: Event spoofing via pane output is accepted risk for local single-user tools.
  applies_when: reviewing security of local CLI tools that read tmux output
  tags: [security, threat-model, accepted-risk, cli]
  severity: P3
  status: accepted_risk

- id: adversarial-means-indistinguishable
  holding: Adversarial design is about indistinguishability, not intent.
  applies_when: evaluating whether independent verification is needed
  tags: [verification, separation-of-powers, epistemology]
  severity: P1
  status: active

- id: status-no-side-effects
  holding: Health/status commands must not inject keystrokes into the target session.
  applies_when: implementing or reviewing health check / status commands
  tags: [cli, side-effects, status, health-check]
  severity: P2
  status: active

- id: unicode-encoding-safety
  holding: CLI help text must stay within ASCII — cp1252 crashes on Unicode.
  applies_when: writing help text, docstrings, or user-facing CLI output
  tags: [cli, encoding, windows, cross-platform]
  severity: P1
  status: active

- id: pypi-version-immutable
  holding: PyPI versions are immutable — always bump before re-releasing.
  applies_when: releasing Python packages to PyPI
  tags: [release, pypi, versioning]
  severity: P1
  status: active
