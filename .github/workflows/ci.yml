name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip and build tools
        run: python -m pip install --upgrade pip build twine

      - name: Compile check
        run: python -B -m py_compile pythond.py test_pythond.py

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Install wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: CLI smoke — pythond
        run: |
          pythond --help >/dev/null
          pythond --version

      - name: CLI smoke — pysh
        run: |
          pysh --help >/dev/null
          pysh --version

      - name: CLI smoke — pyctl
        run: |
          pyctl --help >/dev/null
          pyctl --version

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Test suite
        run: python -B test_pythond.py
