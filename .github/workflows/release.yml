name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  test-wheel:
    name: Test wheel (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: python -m pip install dist/*.whl

      - name: Verify installed wheel import
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          python - <<'PY'
          import pathlib
          import pythond
          path = pathlib.Path(pythond.__file__).resolve()
          print(path)
          assert "agent-repl" not in str(path), path
          assert "site-packages" in str(path) or "dist-packages" in str(path), path
          PY

      - name: CLI smoke — pythond
        run: |
          pythond --help >/dev/null
          pythond --version

      - name: CLI smoke — pysh
        run: |
          pysh --help >/dev/null
          pysh --version

      - name: CLI smoke — pyctl
        run: |
          pyctl --help >/dev/null
          pyctl --version

      - name: Test suite
        run: python -B test_pythond.py

  publish:
    name: Publish to PyPI
    needs: [build, test-wheel]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
